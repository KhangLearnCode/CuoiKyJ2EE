<!-- Common Styles Fragment for FSM Jobs Pages -->
<div th:fragment="styles">
<style>
  :root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --background: #0f172a;
    --surface: #1e293b;
    --text: #e2e8f0;
    --text-secondary: #94a3b8;
  }
  
  body {
    background: var(--background);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  
  .floating-shapes { 
    position: fixed; 
    inset: 0; 
    z-index: -1; 
  }
  
  .shape { 
    position: absolute; 
    border-radius: 50%; 
    filter: blur(40px); 
    background: rgba(99, 102, 241, 0.12); 
    animation: float 20s infinite ease-in-out; 
  }
  
  .shape:nth-child(1) { width: 260px; height: 260px; top: 10%; left: 8%; }
  .shape:nth-child(2) { width: 180px; height: 180px; top: 58%; right: 10%; animation-delay: 4s; }
  .shape:nth-child(3) { width: 220px; height: 220px; bottom: 8%; left: 32%; animation-delay: 9s; }
  
  @keyframes float { 
    0%, 100% { transform: translate(0,0); } 
    50% { transform: translate(25px,-20px); } 
  }

  .fsm-icon-btn { 
    border: 0; 
    background: transparent; 
    color: #fff; 
    font-size: 1.2rem; 
    margin-right: 12px; 
  }
  
  body.sidebar-collapsed #sidebarMenu {
    display: none !important;
  }
  
  body.sidebar-collapsed .main-wrapper {
    margin-left: 0 !important;
    width: 100% !important;
    max-width: 100% !important;
    flex: 0 0 100%;
  }
  
  .navbar {
    background: rgba(15, 23, 42, .85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(99,102,241,.2);
  }
  
  .navbar-brand, .nav-link, .title-group h1 { 
    color: var(--text) !important; 
  }
  
  .title-group small, .text-muted { 
    color: var(--text-secondary) !important; 
  }
  
  .card-header, .card-body, .small, span, p, li, label, h6, h5, h4, h3, h2, h1, div { 
    color: var(--text); 
  }
  
  .text-secondary { 
    color: var(--text-secondary) !important; 
  }
  
  .alert { 
    color: #fff !important; 
  }
  
  .btn-outline-secondary, .btn-outline-dark { 
    color: #fff !important; 
    border-color: rgba(255,255,255,.35) !important; 
  }
  
  .btn-outline-secondary:hover, .btn-outline-dark:hover { 
    background: rgba(255,255,255,.12) !important; 
  }
  
  .sidebar { 
    background: rgba(15, 23, 42, .75); 
    border-right: 1px solid rgba(99,102,241,.2); 
  }
  
  .sidebar .nav-link.active { 
    background: rgba(99,102,241,.2); 
    border-radius: 10px; 
  }
  
  .form-control,
  .form-select {
    border-radius: 10px !important;
    border: 1px solid rgba(99,102,241,.2) !important;
    min-height: 46px;
    background: rgba(15, 23, 42, 0.55) !important;
    color: var(--text) !important;
  }
  
  .form-control::placeholder { 
    color: #cbd5e1 !important; 
    opacity: .85; 
  }
  
  option { 
    color: #fff; 
    background: #1f2937; 
  }
  
  .form-control:focus,
  .form-select:focus {
    border-color: #80bdff !important;
    box-shadow: 0 0 0 0.2rem rgba(0,123,255,.15) !important;
  }
  
  .btn { 
    border-radius: 10px !important; 
  }
  
  .signature-canvas { 
    width: 100%; 
    height: 180px; 
    border: 1px dashed #8b99ad; 
    border-radius: 18px; 
    touch-action: none; 
    background: #fff; 
  }
  
  .job-image { 
    width: 100%; 
    height: 150px; 
    object-fit: cover; 
    background: #f8f9fa; 
    border-radius: 14px; 
  }
  
  .notification-item { 
    border: 1px solid rgba(99,102,241,.2); 
    border-radius: 12px; 
    padding: 14px; 
    margin-bottom: 12px; 
    background: rgba(15,23,42,.45); 
    color: #f8fafc !important; 
  }
  
  .notification-item .fw-semibold { 
    color: #ffffff !important; 
  }
  
  .notification-item .small { 
    color: #e2e8f0 !important; 
  }
  
  .notification-item .text-muted { 
    color: #cbd5e1 !important; 
  }
  
  .notification-item.unread { 
    border-color: rgba(99,102,241,.55); 
    background: rgba(30, 41, 59, 0.9); 
  }
  
  #scannerReader { 
    width: 100%; 
    min-height: 240px; 
    border: 1px dashed #8b99ad; 
    border-radius: 18px; 
    overflow: hidden; 
    background: rgba(255,255,255,0.92); 
  }
  
  .lookup-result { 
    border: 1px solid rgba(99,102,241,.2); 
    border-radius: 12px; 
    padding: 14px; 
    background: rgba(15,23,42,.45); 
  }
  
  #jobsBody > div,
  #partsList > div {
    border: 1px solid rgba(99,102,241,.2) !important;
    border-radius: 12px !important;
    background: rgba(15,23,42,.45);
  }
  
  #selectedJobBox ul {
    padding-left: 1.1rem;
  }
  
  #partQrPanel {
    border-radius: 12px !important;
    border: 1px solid rgba(99,102,241,.2) !important;
  }
  
  .custom-block {
    background: rgba(30, 41, 59, 0.75) !important;
    border: 1px solid rgba(99,102,241,.2);
    border-radius: 14px;
  }
  
  .border, hr { 
    border-color: rgba(148,163,184,.28) !important; 
  }
  
  .badge.text-bg-light { 
    background: rgba(99,102,241,.2) !important; 
    color: #dbeafe !important; 
  }
  
  /* Jobs Sub-Navbar */
  .jobs-subnav {
    background: rgba(30, 41, 59, 0.85);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(99,102,241,.15);
    padding: 0.75rem 1rem;
    margin-bottom: 1.5rem;
    border-radius: 10px;
  }
  
  .jobs-subnav .nav-link {
    color: var(--text-secondary);
    padding: 0.5rem 1rem;
    border-radius: 8px;
    transition: all 0.2s;
  }
  
  .jobs-subnav .nav-link:hover {
    color: var(--text);
    background: rgba(99,102,241,.15);
  }
  
  .jobs-subnav .nav-link.active {
    color: var(--text);
    background: rgba(99,102,241,.25);
    font-weight: 500;
  }
  
  .jobs-subnav .nav-link i {
    margin-right: 0.5rem;
  }
</style>
</div>
