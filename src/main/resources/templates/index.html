<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Trang chủ - Nhóm 13</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        .hidden { display: none; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Nhóm 13 - Hệ thống xác thực</a>
            <div class="navbar-nav ms-auto">
                <span id="user-info" class="nav-link text-white me-3 hidden"></span>
                <a id="btn-login" class="btn btn-outline-light me-2" href="/login">Đăng nhập</a>
                <a id="btn-register" class="btn btn-primary" href="/register">Đăng ký</a>
                <button id="btn-logout" class="btn btn-danger hidden" onclick="logout()">Đăng xuất</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <h1 class="mb-4">Chào mừng đến với Hệ thống Nhóm 13</h1>
                <div class="card p-4 shadow">
                    <h3>Kiểm tra quyền truy cập</h3>
                    <div class="mt-4">
                        <button class="btn btn-secondary m-2" onclick="testAccess('/api/test/all')">Nội dung công khai</button>
                        <button class="btn btn-info m-2" onclick="testAccess('/api/test/user')">Nội dung Người dùng</button>
                        <button class="btn btn-warning m-2" onclick="testAccess('/api/test/admin')">Nội dung Quản trị viên</button>
                    </div>
                    <div id="result" class="mt-4 p-3 border rounded bg-white" style="min-height: 50px;">
                        Kết quả sẽ hiển thị ở đây...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Kiểm tra xem đã đăng nhập chưa
        const user = JSON.parse(localStorage.getItem('user'));
        if (user && user.token) {
            document.getElementById('user-info').textContent = 'Chào, ' + user.username + ' (' + user.roles.join(', ') + ')';
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('btn-login').classList.add('hidden');
            document.getElementById('btn-register').classList.add('hidden');
            document.getElementById('btn-logout').classList.remove('hidden');
        }

        function logout() {
            localStorage.removeItem('user');
            window.location.reload();
        }

        async function testAccess(url) {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = 'Đang tải...';
            
            const user = JSON.parse(localStorage.getItem('user'));
            const headers = {};
            if (user && user.token) {
                headers['Authorization'] = 'Bearer ' + user.token;
            }

            try {
                const response = await axios.get(url, { headers });
                resultDiv.className = 'mt-4 p-3 border rounded bg-success text-white';
                resultDiv.textContent = response.data;
            } catch (error) {
                resultDiv.className = 'mt-4 p-3 border rounded bg-danger text-white';
                if (error.response && error.response.status === 401) {
                    resultDiv.textContent = 'Lỗi 401: Bạn chưa đăng nhập hoặc không có quyền!';
                } else if (error.response && error.response.status === 403) {
                    resultDiv.textContent = 'Lỗi 403: Bạn không có quyền truy cập trang này!';
                } else {
                    resultDiv.textContent = 'Lỗi: ' + (error.response ? error.response.data.message : error.message);
                }
            }
        }
    </script>
</body>
</html>
