<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>FSM Jobs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-light">
<div class="container py-3">
  <div class="d-flex justify-content-between mb-3">
    <h4>FSM Jobs</h4>
    <div><span id="userLabel" class="me-2"></span><button class="btn btn-sm btn-danger" onclick="logout()">Logout</button></div>
  </div>

  <div id="messageBox" class="alert d-none"></div>

  <div class="row g-3">
    <div class="col-lg-4">
      <div class="card mb-3" id="jobFormCard">
        <div class="card-header">Job Form (Admin)</div>
        <div class="card-body">
          <form id="jobForm">
            <input type="hidden" id="jobId"/>
            <input class="form-control mb-2" id="title" placeholder="Title" required/>
            <input class="form-control mb-2" id="customerName" placeholder="Customer" required/>
            <input class="form-control mb-2" id="serviceAddress" placeholder="Address" required/>
            <input class="form-control mb-2" id="scheduledDate" type="date" required/>
            <select class="form-select mb-2" id="priority">
              <option>LOW</option><option selected>MEDIUM</option><option>HIGH</option><option>URGENT</option>
            </select>
            <textarea class="form-control mb-2" id="description" placeholder="Description"></textarea>
            <button class="btn btn-primary btn-sm" type="submit" id="jobSubmitBtn">Save Job</button>
            <button class="btn btn-outline-secondary btn-sm" type="button" onclick="resetJobForm()">Reset</button>
          </form>
        </div>
      </div>

      <div class="card mb-3">
        <div class="card-header">Filters</div>
        <div class="card-body">
          <input class="form-control mb-2" id="filterKeyword" placeholder="Keyword"/>
          <select class="form-select mb-2" id="filterStatus"><option value="">ALL</option><option>CREATED</option><option>ASSIGNED</option><option>IN_PROGRESS</option><option>COMPLETED</option><option>CANCELLED</option></select>
          <select class="form-select mb-2" id="filterPriority"><option value="">ALL</option><option>LOW</option><option>MEDIUM</option><option>HIGH</option><option>URGENT</option></select>
          <button class="btn btn-dark btn-sm" onclick="loadJobs()" type="button">Load Jobs</button>
        </div>
      </div>

      <div class="card" id="inventoryCard">
        <div class="card-header">Inventory (Admin)</div>
        <div class="card-body">
          <form id="partForm" class="mb-2">
            <input type="hidden" id="partId"/>
            <input class="form-control mb-2" id="partCode" placeholder="Part Code" required/>
            <input class="form-control mb-2" id="partName" placeholder="Part Name" required/>
            <div class="row g-2 mb-2">
              <div class="col"><input class="form-control" id="partUnit" value="pcs" required/></div>
              <div class="col"><input class="form-control" id="partStock" type="number" min="0" placeholder="Stock" required/></div>
            </div>
            <div class="row g-2 mb-2">
              <div class="col"><input class="form-control" id="partMinStock" type="number" min="0" placeholder="Min" required/></div>
              <div class="col"><select class="form-select" id="partActive"><option value="true" selected>Active</option><option value="false">Inactive</option></select></div>
            </div>
            <button class="btn btn-primary btn-sm" type="submit" id="partSubmitBtn">Save Part</button>
            <button class="btn btn-outline-secondary btn-sm" type="button" onclick="resetPartForm()">Reset</button>
          </form>
          <div id="partsList" class="small"></div>
        </div>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="card">
        <div class="card-header d-flex justify-content-between"><span>Jobs</span><span id="jobCount" class="badge text-bg-dark">0</span></div>
        <div class="card-body" id="jobsBody"></div>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="card">
        <div class="card-header">Selected Job</div>
        <div class="card-body" id="selectedJobBox"><div class="text-muted">Select job</div></div>
      </div>
    </div>
  </div>
</div>

<script>
const user = JSON.parse(localStorage.getItem('user')); if (!user || !user.token) window.location.href='/login';
const isAdmin = user.roles.includes('ROLE_ADMIN');
const authHeaders = { Authorization:'Bearer '+user.token };
const state = { jobs:[], selected:null, parts:[] };
document.getElementById('userLabel').textContent = user.username + ' - ' + user.roles.join(',');
if(!isAdmin){ document.getElementById('jobFormCard').classList.add('d-none'); document.getElementById('inventoryCard').classList.add('d-none'); }
document.getElementById('jobForm').addEventListener('submit', submitJob);
document.getElementById('partForm').addEventListener('submit', submitPart);

function showMessage(m,t){ const b=document.getElementById('messageBox'); b.textContent=m; b.className='alert alert-'+t; }
function resolveError(e){ return e.response?.data?.message || e.message || 'Error'; }
function logout(){ localStorage.removeItem('user'); window.location.href='/login'; }

async function init(){ await loadParts(); await loadJobs(); }

async function loadJobs(){
  try{
    const params={};
    const k=document.getElementById('filterKeyword').value.trim(); if(k) params.keyword=k;
    const s=document.getElementById('filterStatus').value; if(s) params.status=s;
    const p=document.getElementById('filterPriority').value; if(p) params.priority=p;
    const res=await axios.get('/api/jobs',{headers:authHeaders,params});
    state.jobs=res.data.content||[]; document.getElementById('jobCount').textContent=state.jobs.length;
    renderJobs(); if(state.jobs.length && !state.selected) await selectJob(state.jobs[0].id);
  }catch(e){ showMessage(resolveError(e),'danger'); }
}

function renderJobs(){
  const box=document.getElementById('jobsBody');
  if(!state.jobs.length){ box.innerHTML='<div class="text-muted">No jobs</div>'; return; }
  box.innerHTML=state.jobs.map(j=>{
    const chk=(j.checklist||[]).filter(x=>x.completed).length+'/'+(j.checklist||[]).length;
    return `<div class="border rounded p-2 mb-2">
      <div><strong>${j.jobCode}</strong> - ${j.title}</div>
      <div class="small text-muted">${j.customerName} | ${j.status} | checklist ${chk}</div>
      <div class="mt-2">
        <button class="btn btn-sm btn-outline-dark" onclick="selectJob(${j.id})">Open</button>
        ${isAdmin?`<button class="btn btn-sm btn-outline-primary" onclick="editJob(${j.id})">Edit</button>
        <button class="btn btn-sm btn-outline-danger" onclick="deleteJob(${j.id})">Delete</button>`:''}
      </div>
    </div>`;
  }).join('');
}

async function selectJob(id){ try{ const r=await axios.get('/api/jobs/'+id,{headers:authHeaders}); state.selected=r.data; renderSelected(); }catch(e){ showMessage(resolveError(e),'danger'); }}

function renderSelected(){
  const b=document.getElementById('selectedJobBox'); const j=state.selected; if(!j){ b.innerHTML='<div class="text-muted">Select job</div>'; return; }
  const partOptions = state.parts.filter(x=>x.active).map(x=>`<option value="${x.id}">${x.partCode} (${x.stockQuantity})</option>`).join('');
  const checklist=(j.checklist||[]).map(i=>`<div class="border rounded p-2 mb-2"><div><strong>${i.itemName}</strong> - ${i.completed?'DONE':'TODO'}</div>
      <div class="small text-muted">${i.note||''}</div><button class="btn btn-sm ${i.completed?'btn-outline-warning':'btn-outline-success'}" onclick="toggleChecklist(${j.id},${i.id},${!i.completed})">${i.completed?'Undo':'Done'}</button></div>`).join('') || '<div class="text-muted">No checklist</div>';
  const parts=(j.usedParts||[]).map(u=>`<li>${u.partCode} - ${u.quantityUsed} ${u.unit} (${u.usedBy||'system'})</li>`).join('') || '<li>No part usage</li>';
  const timeline=(j.timeline||[]).map(t=>`<li>${t.activityType}: ${t.message}</li>`).join('') || '<li>No timeline</li>';
  b.innerHTML=`<div><strong>${j.jobCode}</strong> ${j.title}</div><div class="small text-muted mb-2">${j.status} | ${j.assignedUsername||'Unassigned'}</div>
    <h6>Checklist</h6>
    ${isAdmin?`<form onsubmit="addChecklist(event,${j.id})" class="mb-2"><input id="checkName" class="form-control form-control-sm mb-1" placeholder="New item" required/><input id="checkNote" class="form-control form-control-sm mb-1" placeholder="Note"/><button class="btn btn-sm btn-primary">Add</button></form>`:''}
    ${checklist}
    <h6 class="mt-3">Use Part</h6>
    <form onsubmit="usePart(event,${j.id})" class="mb-2"><select id="usePartId" class="form-select form-select-sm mb-1" required><option value="">Select part</option>${partOptions}</select>
    <input id="useQty" type="number" min="1" class="form-control form-control-sm mb-1" placeholder="Qty" required/><input id="useNote" class="form-control form-control-sm mb-1" placeholder="Note"/><button class="btn btn-sm btn-dark">Record</button></form>
    <ul>${parts}</ul>
    <h6>Timeline</h6><ul>${timeline}</ul>`;
}

async function submitJob(e){ e.preventDefault(); const id=document.getElementById('jobId').value;
  const payload={ title:title.value.trim(), description:description.value.trim(), customerName:customerName.value.trim(), serviceAddress:serviceAddress.value.trim(), scheduledDate:scheduledDate.value, priority:priority.value };
  try{ if(id){ await axios.put('/api/jobs/'+id,payload,{headers:authHeaders}); showMessage('Job updated','success'); } else { await axios.post('/api/jobs',payload,{headers:authHeaders}); showMessage('Job created','success'); }
    resetJobForm(); state.selected=null; await loadJobs();
  }catch(e2){ showMessage(resolveError(e2),'danger'); }
}
function editJob(id){ selectJob(id).then(()=>{ const j=state.selected; jobId.value=j.id; title.value=j.title; description.value=j.description||''; customerName.value=j.customerName; serviceAddress.value=j.serviceAddress; scheduledDate.value=j.scheduledDate; priority.value=j.priority; jobSubmitBtn.textContent='Update Job'; }); }
function resetJobForm(){ document.getElementById('jobForm').reset(); jobId.value=''; priority.value='MEDIUM'; jobSubmitBtn.textContent='Save Job'; }
async function deleteJob(id){ if(!confirm('Delete job?')) return; try{ await axios.delete('/api/jobs/'+id,{headers:authHeaders}); showMessage('Deleted','success'); state.selected=null; await loadJobs(); }catch(e){ showMessage(resolveError(e),'danger'); }}

async function addChecklist(e,id){ e.preventDefault(); try{ await axios.post('/api/jobs/'+id+'/checklist',{itemName:checkName.value.trim(),note:checkNote.value.trim()},{headers:authHeaders}); showMessage('Checklist added','success'); await loadJobs(); await selectJob(id);}catch(er){ showMessage(resolveError(er),'danger'); }}
async function toggleChecklist(jobId,itemId,completed){ try{ await axios.patch('/api/jobs/'+jobId+'/checklist/'+itemId,{completed},{headers:authHeaders}); showMessage('Checklist updated','success'); await loadJobs(); await selectJob(jobId);}catch(er){ showMessage(resolveError(er),'danger'); }}
async function usePart(e,id){ e.preventDefault(); try{ await axios.post('/api/jobs/'+id+'/parts-usage',{partId:Number(usePartId.value),quantityUsed:Number(useQty.value),note:useNote.value.trim()},{headers:authHeaders}); showMessage('Part usage recorded','success'); await loadParts(); await loadJobs(); await selectJob(id);}catch(er){ showMessage(resolveError(er),'danger'); }}

async function loadParts(){ try{ const r=await axios.get('/api/parts',{headers:authHeaders}); state.parts=r.data||[]; renderParts(); }catch(e){ showMessage(resolveError(e),'danger'); }}
function renderParts(){ const b=document.getElementById('partsList'); if(!b) return; if(!state.parts.length){ b.innerHTML='No parts'; return; }
  b.innerHTML=state.parts.map(p=>`<div class="border rounded p-2 mb-1"><strong>${p.partCode}</strong> ${p.partName} | stock ${p.stockQuantity}
  ${isAdmin?`<div><button class="btn btn-sm btn-outline-primary" onclick="editPart(${p.id})">Edit</button><button class="btn btn-sm btn-outline-secondary" onclick="adjustStock(${p.id},10)">+10</button><button class="btn btn-sm btn-outline-secondary" onclick="adjustStock(${p.id},-10)">-10</button><button class="btn btn-sm btn-outline-danger" onclick="deletePart(${p.id})">Delete</button></div>`:''}</div>`).join(''); }

async function submitPart(e){ e.preventDefault(); const id=partId.value; const payload={ partCode:partCode.value.trim(), partName:partName.value.trim(), unit:partUnit.value.trim(), stockQuantity:Number(partStock.value), minimumStockLevel:Number(partMinStock.value), active:partActive.value==='true' };
  try{ if(id){ await axios.put('/api/parts/'+id,payload,{headers:authHeaders}); showMessage('Part updated','success'); } else { await axios.post('/api/parts',payload,{headers:authHeaders}); showMessage('Part created','success'); }
    resetPartForm(); await loadParts(); if(state.selected) renderSelected(); }catch(er){ showMessage(resolveError(er),'danger'); }}
function editPart(id){ const p=state.parts.find(x=>x.id===id); if(!p) return; partId.value=p.id; partCode.value=p.partCode; partName.value=p.partName; partUnit.value=p.unit; partStock.value=p.stockQuantity; partMinStock.value=p.minimumStockLevel; partActive.value=String(p.active); partSubmitBtn.textContent='Update Part'; }
function resetPartForm(){ document.getElementById('partForm').reset(); partId.value=''; partUnit.value='pcs'; partActive.value='true'; partSubmitBtn.textContent='Save Part'; }
async function adjustStock(id,deltaQuantity){ try{ await axios.patch('/api/parts/'+id+'/stock',{deltaQuantity},{headers:authHeaders}); showMessage('Stock adjusted','success'); await loadParts(); }catch(er){ showMessage(resolveError(er),'danger'); }}
async function deletePart(id){ if(!confirm('Delete part?')) return; try{ await axios.delete('/api/parts/'+id,{headers:authHeaders}); showMessage('Part deleted','success'); await loadParts(); }catch(er){ showMessage(resolveError(er),'danger'); }}

init();
</script>
</body>
</html>
