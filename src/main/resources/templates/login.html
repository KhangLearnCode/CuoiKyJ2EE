<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | FSM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --bg: #f5efe6;
            --line: rgba(31, 41, 55, 0.12);
            --brand: #0f766e;
            --brand-deep: #115e59;
            --accent: #d97706;
            --text: #182230;
            --muted: #667085;
        }
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(15, 118, 110, 0.16), transparent 28%),
                radial-gradient(circle at bottom right, rgba(217, 119, 6, 0.12), transparent 24%),
                linear-gradient(180deg, #fbf7f0 0%, #efe5d6 100%);
            font-family: "Manrope", sans-serif;
            color: var(--text);
        }
        .auth-shell {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }
        .auth-layout {
            width: min(1100px, 100%);
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 24px;
        }
        .story-panel, .form-panel {
            border: 1px solid rgba(255,255,255,0.6);
            border-radius: 30px;
            background: rgba(255,255,255,0.74);
            backdrop-filter: blur(20px);
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
        }
        .story-panel {
            padding: 40px;
            background:
                linear-gradient(160deg, rgba(15, 118, 110, 0.95) 0%, rgba(17, 94, 89, 0.92) 55%, rgba(19, 30, 41, 0.90) 100%);
            color: #f7fbfc;
        }
        .form-panel {
            padding: 40px;
        }
        .brand {
            font-family: "Space Grotesk", sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }
        .hero-title {
            font-family: "Space Grotesk", sans-serif;
            font-size: clamp(2.2rem, 4vw, 3.8rem);
            line-height: 0.98;
            letter-spacing: -0.05em;
            max-width: 10ch;
        }
        .form-label {
            font-weight: 700;
            font-size: 0.95rem;
        }
        .form-control {
            border-radius: 16px;
            border: 1px solid var(--line);
            padding: 0.95rem 1rem;
        }
        .form-control:focus {
            border-color: rgba(15, 118, 110, 0.5);
            box-shadow: 0 0 0 0.2rem rgba(15, 118, 110, 0.14);
        }
        .btn-brand {
            width: 100%;
            border-radius: 16px;
            padding: 0.95rem 1rem;
            border: none;
            background: linear-gradient(135deg, var(--brand) 0%, var(--brand-deep) 100%);
            font-weight: 800;
        }
        .message-box {
            min-height: 24px;
            font-weight: 700;
        }
        .muted-link, .muted-link:hover {
            color: var(--brand);
            font-weight: 700;
            text-decoration: none;
        }
        @media (max-width: 991px) {
            .auth-layout {
                grid-template-columns: 1fr;
            }
            .story-panel {
                padding: 28px;
            }
            .form-panel {
                padding: 28px;
            }
        }
    </style>
</head>
<body>
<main class="auth-shell">
    <div class="auth-layout">
        <section class="story-panel">
            <div class="brand mb-4">FSM Control Center</div>
            <h1 class="hero-title mb-4">Sign in and continue field operations.</h1>
            <p class="mb-4 opacity-75">
                Access the jobs workspace, technician execution tools, part lookup, notifications,
                reports, and inventory control from one operational console.
            </p>
            <div class="d-flex flex-wrap gap-2">
                <span class="badge rounded-pill text-bg-light px-3 py-2">Dispatch</span>
                <span class="badge rounded-pill text-bg-light px-3 py-2">Technician</span>
                <span class="badge rounded-pill text-bg-light px-3 py-2">Warehouse</span>
            </div>
        </section>

        <section class="form-panel">
            <div class="d-flex justify-content-between align-items-start gap-3 mb-4">
                <div>
                    <div class="text-uppercase fw-bold small text-secondary mb-2">Welcome back</div>
                    <h2 class="h1 fw-bold mb-0">Login</h2>
                </div>
                <a class="btn btn-outline-dark rounded-pill px-3" href="/">Home</a>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" class="form-control" id="username" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button type="submit" class="btn btn-brand text-white">Sign in</button>
            </form>

            <div id="message" class="message-box mt-3"></div>
            <div class="mt-4 text-secondary">
                No account yet?
                <a class="muted-link" href="/register">Create one now</a>
            </div>
        </section>
    </div>
</main>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const messageDiv = document.getElementById('message');
        messageDiv.className = 'message-box mt-3 text-secondary';
        messageDiv.textContent = 'Signing in...';

        try {
            const response = await axios.post('/api/auth/signin', { username, password });
            localStorage.setItem('user', JSON.stringify(response.data));
            messageDiv.className = 'message-box mt-3 text-success';
            messageDiv.textContent = 'Login successful. Redirecting...';
            setTimeout(() => window.location.href = '/jobs', 900);
        } catch (error) {
            messageDiv.className = 'message-box mt-3 text-danger';
            messageDiv.textContent = 'Login failed: ' + (error.response?.data?.message || error.message);
        }
    });
</script>
</body>
</html>
