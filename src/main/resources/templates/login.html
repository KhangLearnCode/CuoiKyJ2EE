<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng nhập - Nhóm 13</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h3>Đăng nhập</h3>
                    </div>
                    <div class="card-body p-4">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="username" class="form-label">Tên đăng nhập</label>
                                <input type="text" class="form-control" id="username" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Mật khẩu</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
                        </form>
                        <div id="message" class="mt-3 text-center"></div>
                        <div class="mt-3 text-center">
                            Chưa có tài khoản? <a href="/register">Đăng ký ngay</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = 'Đang xử lý...';

            try {
                const response = await axios.post('/api/auth/signin', { username, password });
                localStorage.setItem('user', JSON.stringify(response.data));
                messageDiv.className = 'mt-3 text-success';
                messageDiv.textContent = 'Đăng nhập thành công! Đang chuyển hướng...';
                setTimeout(() => window.location.href = '/', 1000);
            } catch (error) {
                messageDiv.className = 'mt-3 text-danger';
                messageDiv.textContent = 'Đăng nhập thất bại: ' + (error.response ? error.response.data.message : error.message);
            }
        });
    </script>
</body>
</html>
