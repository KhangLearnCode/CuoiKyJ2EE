<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | FSM Cloud Ops</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --background: #0f172a;
            --surface: #1e293b;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
        }
        * { box-sizing: border-box; }
        body {
            min-height: 100vh;
            margin: 0;
            background: var(--background);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }
        .floating-shapes { position: fixed; inset: 0; z-index: -1; }
        .shape { position: absolute; border-radius: 50%; filter: blur(40px); background: rgba(99, 102, 241, 0.12); animation: float 20s infinite ease-in-out; }
        .shape:nth-child(1) { width: 260px; height: 260px; top: 10%; left: 8%; }
        .shape:nth-child(2) { width: 180px; height: 180px; top: 58%; right: 10%; animation-delay: 4s; }
        .shape:nth-child(3) { width: 220px; height: 220px; bottom: 8%; left: 32%; animation-delay: 9s; }
        @keyframes float { 0%,100%{transform:translate(0,0)} 50%{transform:translate(25px,-20px)} }

        .shell { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .auth-card {
            width: min(520px, 100%);
            background: rgba(30, 41, 59, 0.75);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 24px 60px rgba(2, 6, 23, .45);
        }
        .title { font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
        .sub { color: var(--text-secondary); margin-bottom: 18px; }
        .form-control {
            border-radius: 10px;
            border: 1px solid rgba(99,102,241,.2);
            background: rgba(15, 23, 42, 0.55);
            color: var(--text);
            padding: .9rem 1rem;
        }
        .form-control:focus {
            border-color: rgba(99,102,241,.6);
            box-shadow: 0 0 0 .2rem rgba(99,102,241,.16);
            background: rgba(15, 23, 42, 0.65);
            color: var(--text);
        }
        .form-control::placeholder { color: #cbd5e1; }
        .form-label, .title, .sub, .text-secondary { color: #fff !important; }
        .btn-brand {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: .85rem 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff;
            font-weight: 700;
        }
        .link { color: #a5b4fc; text-decoration: none; font-weight: 600; }
        .message-box { min-height: 24px; font-weight: 600; }
    </style>
</head>
<body>
<div class="floating-shapes"><div class="shape"></div><div class="shape"></div><div class="shape"></div></div>
<main class="shell">
    <section class="auth-card">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <div class="title">FSM Cloud Ops Login</div>
            <a class="btn btn-outline-light btn-sm" href="/">Home</a>
        </div>
        <div class="sub">Đăng nhập để vào workspace điều phối và xử lý công việc.</div>

        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" required>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn-brand">Sign in</button>
        </form>

        <div id="message" class="message-box mt-3"></div>
        <div class="mt-3 text-secondary">
            No account yet? <a class="link" href="/register">Create one now</a>
        </div>
    </section>
</main>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const messageDiv = document.getElementById('message');
        messageDiv.className = 'message-box mt-3 text-secondary';
        messageDiv.textContent = 'Signing in...';

        try {
            const response = await axios.post('/api/auth/signin', { username, password });
            localStorage.setItem('user', JSON.stringify(response.data));
            messageDiv.className = 'message-box mt-3 text-success';
            messageDiv.textContent = 'Login successful. Redirecting...';
            setTimeout(() => window.location.href = '/jobs', 900);
        } catch (error) {
            messageDiv.className = 'message-box mt-3 text-danger';
            messageDiv.textContent = 'Login failed: ' + (error.response?.data?.message || error.message);
        }
    });
</script>
</body>
</html>
