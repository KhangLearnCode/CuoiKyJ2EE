<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng ký - FSM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-success text-white text-center">
                    <h3>Tạo tài khoản FSM</h3>
                </div>
                <div class="card-body p-4">
                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="username" class="form-label">Tên đăng nhập</label>
                            <input type="text" class="form-control" id="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Mật khẩu</label>
                            <input type="password" class="form-control" id="password" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label d-block">Vai trò</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" id="roleUser" value="user" checked>
                                <label class="form-check-label" for="roleUser">User / Technician</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="checkbox" id="roleAdmin" value="admin">
                                <label class="form-check-label" for="roleAdmin">Admin / Dispatcher</label>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Đăng ký</button>
                    </form>
                    <div id="message" class="mt-3 text-center"></div>
                    <div class="mt-3 text-center">
                        Đã có tài khoản? <a href="/login">Đăng nhập ngay</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const role = [];
        if (document.getElementById('roleUser').checked) role.push('user');
        if (document.getElementById('roleAdmin').checked) role.push('admin');

        const messageDiv = document.getElementById('message');
        messageDiv.textContent = 'Đang xử lý...';

        try {
            await axios.post('/api/auth/signup', { username, email, password, role });
            messageDiv.className = 'mt-3 text-success';
            messageDiv.textContent = 'Đăng ký thành công. Đang chuyển đến trang đăng nhập...';
            setTimeout(() => window.location.href = '/login', 1500);
        } catch (error) {
            messageDiv.className = 'mt-3 text-danger';
            messageDiv.textContent = 'Đăng ký thất bại: ' + (error.response?.data?.message || error.message);
        }
    });
</script>
</body>
</html>
